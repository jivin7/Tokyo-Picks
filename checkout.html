<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Tokyo Picks</title>
  <link rel="stylesheet" href="style.css">
<base target="_self">
</head>
<body>
  <div class="announcement" role="status"><span class="announcement-text">Welcome to our store</span></div>
  <header class="top-nav">
    <div class="logo">Tokyo Picks</div>
    <div class="nav-right">
      <a href="index.html" class="icon-btn checkout-back-btn" aria-label="Back to home" title="Back to home">Back</a>
      <a href="login.html" class="icon-btn" id="login-nav-btn" aria-label="Log in" title="Log in">Log in</a>
      <div class="menu-container" id="user-menu-container">
        <button type="button" class="icon-btn" id="user-btn" aria-label="Account menu" title="Account">
          <svg class="nav-user-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="3.25"></circle>
            <path d="M3.5 20.5a8.5 8.5 0 0 1 17 0"></path>
          </svg>
        </button>
        <div class="dropdown-menu" id="user-dropdown-menu">
          <a href="user-data-base.html" class="menu-item" id="user-name-display" target="_self" style="font-weight:700; color:#1f2937;">Account</a>
          <a href="#" class="menu-item" id="logout-link">Logout</a>
        </div>
      </div>
    </div>
  </header>

  <main class="checkout-page">
    <section class="checkout-items-panel">
      <h1>Your Cart</h1>
      <div id="checkout-items" class="checkout-items"></div>
    </section>

    <aside class="checkout-summary-panel">
      <h2>Order Summary</h2>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summary-subtotal">LE 0.00 EGP</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span id="summary-shipping">LE 0.00 EGP</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="summary-total">LE 40.00 EGP</span>
      </div>
      <button id="checkout-btn" class="checkout-btn" type="button">Checkout</button>
    </aside>
  </main>

  <script src="js/tokyo-auth.js"></script>
  <script>
    (function () {
      const itemsContainer = document.getElementById('checkout-items');
      const subtotalEl = document.getElementById('summary-subtotal');
      const shippingEl = document.getElementById('summary-shipping');
      const totalEl = document.getElementById('summary-total');
      const checkoutBtn = document.getElementById('checkout-btn');
      const SHIPPING = 0;

      function getStoredCartItems() {
        try {
          let saved = null;
          if (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB.get) {
            saved = TokyoPicksDB.get('tokyo_cart_items');
          }
          if (saved == null) {
            saved = localStorage.getItem('tokyo_cart_items');
          }
          return saved ? JSON.parse(saved) : [];
        } catch (error) {
          return [];
        }
      }

      function setStoredCartItems(items) {
        const json = JSON.stringify(items);
        if (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB.set) {
          TokyoPicksDB.set('tokyo_cart_items', json);
          const u =
            typeof TokyoPicksSession !== 'undefined' &&
            TokyoPicksSession.getUser &&
            TokyoPicksSession.getUser();
          if (u && u.email && TokyoPicksDB.setJSON) {
            TokyoPicksDB.set('tokyo_cart_' + u.email, json);
            TokyoPicksDB.setJSON('tokyo_user_state_' + u.email, {
              cartItems: json,
              updatedAt: Date.now()
            });
          }
          return;
        }
        localStorage.setItem('tokyo_cart_items', json);
      }

      function parsePrice(priceText) {
        const numeric = String(priceText || '').replace(/[^\d.]/g, '');
        return parseFloat(numeric || '0');
      }

      function money(value) {
        return `LE ${value.toFixed(2)} EGP`;
      }

      function renderCheckout() {
        const items = getStoredCartItems();
        shippingEl.textContent = money(SHIPPING);
        if (!items.length) {
          itemsContainer.innerHTML = '<p class="checkout-empty">Your cart is empty. <a href="index.html">Go shopping</a></p>';
          subtotalEl.textContent = money(0);
          totalEl.textContent = money(SHIPPING);
          checkoutBtn.disabled = true;
          return;
        }

        let subtotal = 0;
        itemsContainer.innerHTML = items.map((item, index) => {
          const unitPrice = parsePrice(item.price);
          const quantity = Number(item.quantity || 1);
          const lineTotal = unitPrice * quantity;
          subtotal += lineTotal;

          return `
            <article class="checkout-item">
              <button class="checkout-remove-btn" type="button" data-index="${index}" aria-label="Remove product">&times;</button>
              <img src="${item.image || ''}" alt="${item.title || 'Product'}">
              <div class="checkout-item-info">
                <h3>${item.title || 'Product'}</h3>
                <p>${item.price || ''}</p>
                <p>Qty: ${quantity}</p>
                <p class="line-total">${money(lineTotal)}</p>
              </div>
            </article>
          `;
        }).join('');

        subtotalEl.textContent = money(subtotal);
        totalEl.textContent = money(subtotal + SHIPPING);
        checkoutBtn.disabled = false;
      }

      let listenersAttached = false;
      function attachListeners() {
        if (listenersAttached) return;
        listenersAttached = true;

        checkoutBtn.addEventListener('click', () => {
          alert('Order placed successfully!');
          const empty = '[]';
          localStorage.setItem('tokyo_cart_items', empty);
          if (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB.set) {
            TokyoPicksDB.set('tokyo_cart_items', empty);
            const u = TokyoPicksSession && TokyoPicksSession.getUser && TokyoPicksSession.getUser();
            if (u && u.email) {
              TokyoPicksDB.set('tokyo_cart_' + u.email, empty);
              if (TokyoPicksDB.setJSON) {
                TokyoPicksDB.setJSON('tokyo_user_state_' + u.email, {
                  cartItems: empty,
                  updatedAt: Date.now()
                });
              }
            }
          }
          renderCheckout();
        });

        itemsContainer.addEventListener('click', (e) => {
          const removeBtn = e.target.closest('.checkout-remove-btn');
          if (!removeBtn) return;
          const index = Number(removeBtn.getAttribute('data-index'));
          const items = getStoredCartItems();
          if (Number.isNaN(index) || index < 0 || index >= items.length) return;
          items.splice(index, 1);
          setStoredCartItems(items);
          renderCheckout();
        });
      }

      function bootCheckout() {
        renderCheckout();
        attachListeners();
      }

      TokyoPicksAuth.mountNav({
        mergeCartOnLoad: true,
        hookCartSave: true,
        logoutRedirect: 'index.html'
      });

      bootCheckout();
    })();
  </script>
</body>
</html>
