<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Tokyo Picks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      max-width: 420px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .auth-card h1 {
      font-size: 28px;
      margin: 0 0 8px 0;
      color: #1f2937;
      text-align: center;
    }
    .auth-subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 28px;
      font-size: 15px;
    }
    .auth-field {
      margin-bottom: 18px;
    }
    .auth-field label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .auth-field input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      background: #fafafa;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .auth-field input:focus {
      outline: none;
      border-color: #746aff;
      background: #fff;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #2b2b36;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .auth-btn:hover {
      background: #1a1a24;
    }
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: #6b7280;
      font-size: 14px;
    }
    .auth-switch a {
      color: #746aff;
      font-weight: 700;
      text-decoration: none;
    }
    .auth-switch a:hover {
      text-decoration: underline;
    }
    .auth-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="announcement" role="status"><span class="announcement-text">Welcome to our store</span></div>
  <header class="top-nav">
    <div class="logo">Tokyo Picks</div>
    <div class="nav-right">
      <a href="index.html" class="icon-btn checkout-back-btn" aria-label="Back to home" title="Back to home">Back</a>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account</p>
      <div class="auth-error" id="login-error"></div>
      <form id="login-form" onsubmit="return false;">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="auth-btn" id="login-btn">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </main>

  <script>
    (function() {
      const loginForm = document.getElementById('login-form');
      const loginBtn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');

      function getUsers() {
        try {
          const saved = localStorage.getItem('tokyo_users');
          return saved ? JSON.parse(saved) : {};
        } catch (e) { return {}; }
      }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('show');
      }

      loginBtn.addEventListener('click', () => {
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const password = document.getElementById('login-password').value;

        if (!email || !password) {
          showError('Please fill in all fields.');
          return;
        }

        const users = getUsers();
        const user = users[email];

        if (!user) {
          showError('Account not found. Please register first.');
          return;
        }

        if (user.password !== password) {
          showError('Incorrect password.');
          return;
        }

        // Login successful
        localStorage.setItem('tokyo_current_user', JSON.stringify({
          email: user.email,
          name: user.name,
          loggedInAt: Date.now()
        }));

        // Restore user's cart
        const userCartKey = 'tokyo_cart_' + user.email;
        const userCart = localStorage.getItem(userCartKey);
        if (userCart) {
          localStorage.setItem('tokyo_cart_items', userCart);
        } else {
          localStorage.setItem('tokyo_cart_items', '[]');
        }

        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
