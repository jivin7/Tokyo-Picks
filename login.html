<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Tokyo Picks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      max-width: 420px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .auth-card h1 {
      font-size: 28px;
      margin: 0 0 8px 0;
      color: #1f2937;
      text-align: center;
    }
    .auth-subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 28px;
      font-size: 15px;
    }
    .auth-field {
      margin-bottom: 18px;
    }
    .auth-field label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .auth-field input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      background: #fafafa;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .auth-field input:focus {
      outline: none;
      border-color: #746aff;
      background: #fff;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #2b2b36;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .auth-btn:hover {
      background: #1a1a24;
    }
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: #6b7280;
      font-size: 14px;
    }
    .auth-switch a {
      color: #746aff;
      font-weight: 700;
      text-decoration: none;
    }
    .auth-switch a:hover {
      text-decoration: underline;
    }
    .auth-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error.show {
      display: block;
    }
    .auth-success {
      background: #d1fae5;
      color: #065f46;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="announcement" role="status"><span class="announcement-text">Welcome to our store</span></div>
  <header class="top-nav">
    <div class="logo">Tokyo Picks</div>
    <div class="nav-right">
      <a href="index.html" class="icon-btn checkout-back-btn" aria-label="Back to home" title="Back to home">Back</a>
      <a href="login.html" class="icon-btn" id="login-nav-btn" aria-label="Login" title="Login" style="text-decoration:none; font-weight:600; font-size:14px; padding:6px 12px;">Login</a>
      <div class="menu-container" id="user-menu-container" style="display:none;">
        <button class="icon-btn" id="user-btn" aria-label="Account" title="Account">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
        <div class="dropdown-menu" id="user-dropdown-menu">
          <div class="menu-item" style="font-weight:700; color:#1f2937; cursor:default;" id="user-name-display">User</div>
          <a href="#" class="menu-item" id="logout-link">Logout</a>
        </div>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account</p>
      <div class="auth-error" id="login-error"></div>
      <div class="auth-success" id="login-success"></div>
      <form id="login-form">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field" id="password-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="auth-btn" id="login-btn">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </main>

  <script src="js/tokyo-auth.js"></script>
  <script>
    (function() {
      const errorEl = document.getElementById('login-error');
      const successEl = document.getElementById('login-success');
      const loginBtn = document.getElementById('login-btn');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');
      const OTP_TTL_MS = 5 * 60 * 1000;

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('show');
        successEl.classList.remove('show');
      }

      function showSuccess(msg) {
        successEl.textContent = msg;
        successEl.classList.add('show');
        errorEl.classList.remove('show');
      }

      function clearMessages() {
        errorEl.classList.remove('show');
        successEl.classList.remove('show');
      }

      function generateOtpCode() {
        return String(Math.floor(100000 + Math.random() * 900000));
      }

      function normalizeEmail(value) {
        return String(value || '').trim().toLowerCase();
      }

      function restoreCartForEmail(email) {
        const userCartKey = 'tokyo_cart_' + email;
        const db = (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB) || null;
        const userCart = db && db.get ? db.get(userCartKey) : localStorage.getItem(userCartKey);
        if (userCart) {
          if (db && db.set) db.set('tokyo_cart_items', userCart);
          else localStorage.setItem('tokyo_cart_items', userCart);
        } else {
          if (db && db.set) db.set('tokyo_cart_items', '[]');
          else localStorage.setItem('tokyo_cart_items', '[]');
        }
      }

      function getUsers() {
        const db = (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB) || null;
        if (db && db.getJSON) return db.getJSON('tokyo_users', {});
        try {
          const saved = localStorage.getItem('tokyo_users');
          return saved ? JSON.parse(saved) : {};
        } catch (e) {
          return {};
        }
      }

      function getUserByEmail(email) {
        const users = getUsers();
        return users[email] || null;
      }

      function validateCredentials(email, password) {
        const user = getUserByEmail(email);
        if (!user) {
          return { ok: false, reason: 'No account on this browser for that email. Create one first.' };
        }
        if (user.password !== password) {
          return { ok: false, reason: 'Incorrect password.' };
        }
        return { ok: true, user: user };
      }

      function completeLogin(user) {
        const db = (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB) || null;
        const payload = {
          email: user.email,
          name: user.name,
          loggedInAt: Date.now()
        };
        if (db && db.setJSON) db.setJSON('tokyo_current_user', payload);
        else localStorage.setItem('tokyo_current_user', JSON.stringify(payload));
        restoreCartForEmail(user.email);
        window.location.href = 'index.html';
      }

      function deliverCodeInsideWebsite(email, code) {
        // Website-local OTP delivery store (no external service needed).
        const db = (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB) || null;
        const payload = { code: code, createdAt: Date.now() };
        if (db && db.setJSON) db.setJSON('tokyo_last_otp_' + email, payload);
        else localStorage.setItem('tokyo_last_otp_' + email, JSON.stringify(payload));
        return Promise.resolve();
      }

      function startVerificationFlow() {
        const email = normalizeEmail(emailInput.value);
        const password = String(passwordInput.value || '');
        clearMessages();
        if (!email || !password) {
          showError('Please enter email and password.');
          return;
        }

        const auth = validateCredentials(email, password);
        if (!auth.ok) {
          showError(auth.reason);
          return;
        }

        const code = generateOtpCode();
        const payload = {
          email: email,
          password: password,
          code: code,
          expiresAt: Date.now() + OTP_TTL_MS,
          sentAt: Date.now()
        };

        loginBtn.disabled = true;
        deliverCodeInsideWebsite(email, code)
          .then(function () {
            const pendingStr = JSON.stringify(payload);
            const db = (typeof TokyoPicksDB !== 'undefined' && TokyoPicksDB) || null;
            try {
              sessionStorage.setItem('tokyo_pending_otp', pendingStr);
            } catch (e1) {}
            if (db && db.setJSON) db.setJSON('tokyo_pending_otp', payload);
            showSuccess('Code generated. Redirecting to enter code...');
            setTimeout(function () {
              window.location.href = 'enter-code.html';
            }, 300);
          })
          .catch(function (err) {
            showError((err && err.message) || 'Failed to send code. Try again.');
          })
          .finally(function () {
            loginBtn.disabled = false;
          });
      }

      const loginForm = document.getElementById('login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', function (e) {
          e.preventDefault();
          startVerificationFlow();
        });
      }
    })();
  </script>
  <script>
    TokyoPicksAuth.mountNav({ mergeCartOnLoad: false });
  </script>
</body>
</html>
